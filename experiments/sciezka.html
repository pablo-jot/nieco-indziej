<!DOCTYPE html>
<html lang="pl">

<head>

    <meta charset="UTF-8">

    <title>Eksperyment – ścieżka</title>

    <style>
        body {

            margin: 0;

            background: #D9BFA0;

            font-family: Georgia, serif;

        }

        .section {

            width: 900px;

            height: 500px;

            margin: 80px auto;

            background: white;

            border: 2px solid #222601;

            display: flex;

            align-items: center;

            justify-content: center;

            font-size: 48px;

        }

        .path {

            display: block;

            margin: -80px auto;

        }
    </style>

</head>

<body>

    <div class="section">

        SEKCJA 1

    </div>

    <svg class="path" width="300" height="700" viewBox="0 0 300 700">

        <path d="M150 0
           C250 120 250 220 150 350
           C50 480 50 580 150 700" fill="none" stroke="#8C7C6D" stroke-width="12" stroke-linecap="round"
            stroke-linejoin="round" stroke-dasharray="2 18" stroke-linecap="round" />

    </svg>

    <div class="section">

        SEKCJA 2

    </div>

    <div class="section">

        SEKCJA 3

    </div>

</body>

</html>
