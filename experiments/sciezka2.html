<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Eksperyment – ścieżka</title>
    <style>
        body {
            margin: 0;
            background: #D9BFA0;
            font-family: Georgia, serif;
        }

        .section {
            width: 900px;
            height: 500px;
            margin: 80px auto;
            background: #fff;
            border: 2px solid #222601;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .path {

            position: relative;

            width: 300px;
            height: 220px;

            margin: 40px auto;

        }

        .boot {

            position: absolute;

            width: 24px;
            height: auto;

        }

        .boot-left {

            left: 115px;
            top: 20px;

            transform: rotate(-8deg);

        }

        .boot-right {

            left: 140px;
            top: 70px;

            transform: rotate(10deg);

        }
    </style>
</head>

<body>
    <div class="section">SEKCJA 1</div>
    <div class="path">

        <img src="../assets/images/boots/boot_left.svg" class="boot boot-left" alt="">

        <img src="../assets/images/boots/boot_right.svg" class="boot boot-right" alt="">

    </div>
    <defs>

        <symbol id="boot" viewBox="0 0 24 36">

            <!-- podeszwa -->

            <path d="M12 36
               C18 36 22 31 22 25
               C22 19 18 16 12 16
               C6 16 2 19 2 25
               C2 31 6 36 12 36 Z" fill="#6B5E4E" />

            <!-- obcas -->

            <path d="M8 12
               C8 6 16 6 16 12
               C16 16 8 16 8 12 Z" fill="#6B5E4E" />

        </symbol>

    </defs>
    <path id="road" d="M150 0
       C250 120 250 220 150 350
       C50 480 50 580 150 700" fill="none" stroke="none" />
    <use href="#boot" x="120" y="30" />
    </svg>
    <div class="section">SEKCJA 2</div>
    <div class="section">SEKCJA 3</div>
</body>

</html>
